<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CausalStudio v1</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --text: #c9d1d9;
    --dim: #8b949e;
    --input-bg: #1f2428;
    --red: #f85149;
    --yellow: #d29922;
  }

  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; overflow: hidden; }

  #app { display: grid; grid-template-columns: 1fr 280px; grid-template-rows: auto auto 1fr auto; height: 100vh; gap: 0; }

  /* HEADER */
  #header {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 16px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  #logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  #logo span { color: var(--dim); font-weight: 400; font-size: 12px; margin-left: 6px; }
  #speed-badge {
    margin-left: auto;
    font-size: 12px; color: var(--dim);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 8px;
  }
  #pause-btn {
    background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 12px;
  }
  #pause-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* CANVAS AREA */
  #canvas-wrap {
    position: relative;
    background: #090e14;
    overflow: hidden;
    grid-row: 3;
    grid-column: 1;
  }
  #canvas { display: block; width: 100%; height: 100%; }

  /* OVERLAY when paused */
  #paused-overlay {
    display: none;
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    align-items: center; justify-content: center;
    font-size: 32px; font-weight: 700; color: var(--accent);
    letter-spacing: 4px;
  }
  #paused-overlay.visible { display: flex; }

  /* SIDEBAR */
  #sidebar {
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    background: var(--panel);
    grid-row: 3;
    grid-column: 2;
  }

  .panel-section {
    border-bottom: 1px solid var(--border);
    padding: 12px;
  }
  .panel-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--dim); margin-bottom: 8px;
  }

  /* STRUCTURE PANEL */
  #structure-list {
    font-size: 12px; line-height: 1.7;
    min-height: 40px;
    color: var(--text);
  }
  .struct-item { display: flex; align-items: center; gap: 6px; }
  .struct-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* MEMORY PANEL */
  #memory-list {
    flex: 1; overflow-y: auto; padding: 12px;
    font-size: 11px; font-family: 'Consolas', monospace;
    line-height: 1.6;
  }
  .mem-obj { margin-bottom: 8px; }
  .mem-id { color: var(--accent); }
  .mem-detail { color: var(--dim); padding-left: 8px; }
  .mem-beh { color: var(--accent2); }

  /* FOOTER INPUT */
  #footer {
    grid-column: 1 / -1;
    display: flex; gap: 8px; align-items: center;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  #prompt-prefix { color: var(--accent); font-weight: 700; font-size: 16px; }
  #input {
    flex: 1;
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-size: 14px;
    border-radius: 6px; padding: 8px 12px;
    outline: none; transition: border-color 0.15s;
  }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--dim); }
  #send-btn {
    background: var(--accent); border: none; color: #000;
    font-size: 13px; font-weight: 600;
    border-radius: 6px; padding: 8px 18px; cursor: pointer;
    transition: opacity 0.15s;
  }
  #send-btn:hover { opacity: 0.85; }

  /* FEEDBACK */
  #feedback {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 16px;
    font-size: 13px; color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    z-index: 10;
  }
  #feedback.show { opacity: 1; }
  #feedback.ok { border-color: var(--accent2); color: var(--accent2); }
  #feedback.err { border-color: var(--red); color: var(--red); }
  #feedback.warn { border-color: var(--yellow); color: var(--yellow); }

  /* HINT PILLS */
  #hints {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 16px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    grid-column: 1 / -1;
  }
  .hint-pill {
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px;
    font-size: 11px; color: var(--dim);
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
    user-select: none;
  }
  .hint-pill:hover { border-color: var(--accent); color: var(--accent); }

  #count-badge {
    margin-left: 4px; font-size: 10px; color: var(--dim);
    background: var(--bg); border-radius: 10px; padding: 1px 6px;
  }

  /* MOBILE */
  @media (max-width: 700px) {
    #app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr auto auto; }
    #canvas-wrap { grid-row: 3; grid-column: 1; }
    #sidebar { grid-row: 4; grid-column: 1; border-left: none; border-top: 1px solid var(--border); max-height: 180px; flex-direction: row; }
    #sidebar .panel-section { flex: 1; border-bottom: none; border-right: 1px solid var(--border); overflow-y: auto; }
    #memory-list { flex: 1; max-height: 160px; }
    #header { padding: 8px 12px; }
    #logo { font-size: 15px; }
    #hints { padding: 6px 10px; gap: 5px; }
    .hint-pill { font-size: 10px; padding: 3px 8px; }
    #footer { padding: 8px 10px; }
    #send-btn { padding: 8px 12px; font-size: 12px; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <header id="header">
    <div id="logo">CAUSAL<span>STUDIO</span> <span style="color:var(--accent2);font-size:11px;font-weight:600;">v1</span></div>
    <div id="speed-badge">vitesse: <b id="speed-val">1.0×</b></div>
    <button id="pause-btn">⏸ pause</button>
  </header>

  <!-- HINT PILLS -->
  <div id="hints">
    <span class="hint-pill" data-cmd="scène aléatoire">✨ scène</span>
    <span class="hint-pill" data-cmd="essaim de cercles">🐦 essaim</span>
    <span class="hint-pill" data-cmd="vortex">🌀 vortex</span>
    <span class="hint-pill" data-cmd="explosion">💥 explosion</span>
    <span class="hint-pill" data-cmd="un cercle bleu">cercle bleu</span>
    <span class="hint-pill" data-cmd="un carré rouge">carré rouge</span>
    <span class="hint-pill" data-cmd="le cercle bleu suit le carré rouge">suit</span>
    <span class="hint-pill" data-cmd="le carré rouge fuit le cercle bleu">fuit</span>
    <span class="hint-pill" data-cmd="le triangle tourne autour du cercle">orbite</span>
    <span class="hint-pill" data-cmd="ajoute un obstacle">obstacle</span>
    <span class="hint-pill" data-cmd="accélère">+ vite</span>
    <span class="hint-pill" data-cmd="efface tout">reset</span>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="paused-overlay">PAUSE</div>
    <div id="feedback"></div>
  </div>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="panel-section">
      <div class="panel-title">Structure <span id="count-badge">0 obj</span></div>
      <div id="structure-list"><span style="color:var(--dim);font-size:11px;">aucun objet</span></div>
    </div>
    <div class="panel-title" style="padding:12px 12px 0;">Mémoire</div>
    <div id="memory-list"></div>
  </aside>

  <!-- FOOTER -->
  <footer id="footer">
    <span id="prompt-prefix">&gt;</span>
    <input id="input" type="text" placeholder="un cercle rouge / le carré suit le cercle / efface tout..." autocomplete="off" spellcheck="false" />
    <button id="send-btn">Envoyer</button>
  </footer>
</div>

<script type="module">
import { parse, COLOR_MAP, SHAPE_MAP } from './parser.js';
import { WorldState, createObject, createObstacle, createGravityWell, createFlock } from './state.js';
import { step } from './engine.js';

// ─── SETUP ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvas-wrap');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const feedbackEl = document.getElementById('feedback');
const pauseBtn = document.getElementById('pause-btn');
const speedVal = document.getElementById('speed-val');
const pausedOverlay = document.getElementById('paused-overlay');
const structureList = document.getElementById('structure-list');
const memoryList = document.getElementById('memory-list');
const countBadge = document.getElementById('count-badge');

const world = new WorldState();

function resize() {
  canvas.width = canvasWrap.offsetWidth;
  canvas.height = canvasWrap.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── FEEDBACK ────────────────────────────────────────────────────────────────
let feedbackTimer;
function showFeedback(msg, type = 'ok') {
  feedbackEl.textContent = msg;
  feedbackEl.className = `show ${type}`;
  clearTimeout(feedbackTimer);
  feedbackTimer = setTimeout(() => { feedbackEl.className = ''; }, 2200);
}

// ─── COMMAND HANDLER ─────────────────────────────────────────────────────────
function handleCommand(text) {
  if (!text.trim()) return;
  const intent = parse(text, world.objects);

  switch (intent.type) {
    case 'CREATE': {
      for (let i = 0; i < (intent.quantity || 1); i++) {
        const obj = createObject({ shape: intent.shape, color: intent.color });
        world.add(obj);
      }
      const n = intent.quantity || 1;
      showFeedback(`✓ ${n > 1 ? n + ' ' : ''}${intent.shape}(s) créé(s)`, 'ok');
      break;
    }
    case 'ADD_OBSTACLE': {
      world.addObstacle(createObstacle());
      showFeedback('✓ obstacle ajouté', 'ok');
      break;
    }
    case 'DESTROY': {
      const targets = world.findByShapeColor(intent.shape, intent.color);
      if (targets.length === 0) {
        showFeedback('⚠ aucun objet trouvé', 'warn');
      } else {
        targets.forEach(o => world.remove(o.id));
        showFeedback(`✓ ${targets.length} objet(s) supprimé(s)`, 'ok');
      }
      break;
    }
    case 'SET_BEHAVIOR': {
      const subj = intent.subject;
      const candidates = world.findByShapeColor(subj.shape, subj.color ? colorNameToHex(subj.color) : null);
      if (candidates.length === 0) {
        showFeedback('⚠ objet source non trouvé', 'warn');
        break;
      }
      let targetObj = null;
      if (intent.target) {
        const t = intent.target;
        const tCandidates = world.findByShapeColor(t.shape, t.color ? colorNameToHex(t.color) : null);
        targetObj = tCandidates[0] || null;
      }
      candidates.forEach(o => {
        o.behavior = intent.behavior;
        o.targetId = targetObj ? targetObj.id : null;
      });
      const behaviorLabel = { seek: 'suit', flee: 'fuit', orbit: 'tourne autour de', wander: 'erre' }[intent.behavior] || intent.behavior;
      showFeedback(`✓ ${candidates.length} objet(s) → ${behaviorLabel}${targetObj ? ' ' + targetObj.shape : ''}`, 'ok');
      break;
    }
    case 'CREATE_FLOCK': {
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const flocks = createFlock(intent.quantity || 12, intent.shape, intent.color, cx, cy);
      flocks.forEach(obj => { world.add(obj); world.addBurst(obj.x, obj.y, obj.color); });
      showFeedback(`✓ essaim de ${flocks.length} créé`, 'ok');
      break;
    }
    case 'ADD_GRAVITY_WELL': {
      const well = createGravityWell({
        x: canvas.width / 2 + (Math.random() - 0.5) * 200,
        y: canvas.height / 2 + (Math.random() - 0.5) * 150,
        repel: intent.repel,
      });
      world.addGravityWell(well);
      showFeedback(`✓ ${intent.repel ? 'répulseur' : 'vortex'} ajouté`, 'ok');
      break;
    }
    case 'SET_PULSE': {
      const targets = world.findByShapeColor(intent.shape, intent.color ? colorNameToHex(intent.color) : null);
      if (targets.length === 0) { showFeedback('⚠ aucun objet trouvé', 'warn'); break; }
      targets.forEach(o => { o.pulse = true; });
      showFeedback(`✓ ${targets.length} objet(s) → pulse`, 'ok');
      break;
    }
    case 'EXPLODE': {
      const objs = Object.values(world.objects);
      if (objs.length === 0) { showFeedback('⚠ monde vide', 'warn'); break; }
      objs.forEach(obj => {
        const angle = Math.random() * Math.PI * 2;
        const force = 4 + Math.random() * 5;
        obj.vx = Math.cos(angle) * force;
        obj.vy = Math.sin(angle) * force;
        world.addBurst(obj.x, obj.y, obj.color);
      });
      showFeedback('💥 explosion !', 'ok');
      break;
    }
    case 'RANDOM_SCENE': {
      world.clear();
      const W = canvas.width, H = canvas.height;
      world.addGravityWell(createGravityWell({ x: W / 2, y: H / 2, strength: 80, color: '#9b59b6' }));
      const flocks2 = createFlock(14, 'circle', '#3498db', W / 2, H / 2);
      flocks2.forEach(obj => { world.add(obj); world.addBurst(obj.x, obj.y, obj.color); });
      const solo = [
        { shape: 'triangle', color: '#e74c3c' },
        { shape: 'star', color: '#f1c40f' },
        { shape: 'diamond', color: '#2ecc71' },
      ];
      solo.forEach(({ shape, color }) => {
        const obj = createObject({ shape, color });
        obj.behavior = 'wander';
        world.add(obj);
        world.addBurst(obj.x, obj.y, color);
      });
      showFeedback('✨ scène générée', 'ok');
      break;
    }
    case 'CLEAR_ALL': {
      world.clear();
      showFeedback('✓ monde effacé', 'ok');
      break;
    }
    case 'PAUSE': {
      world.paused = true;
      pauseBtn.textContent = '▶ reprendre';
      pausedOverlay.classList.add('visible');
      showFeedback('⏸ pause', 'warn');
      break;
    }
    case 'RESUME': {
      world.paused = false;
      pauseBtn.textContent = '⏸ pause';
      pausedOverlay.classList.remove('visible');
      showFeedback('▶ repris', 'ok');
      break;
    }
    case 'SPEED': {
      world.speed = Math.max(0.1, Math.min(5, world.speed + intent.delta));
      speedVal.textContent = world.speed.toFixed(1) + '×';
      showFeedback(`✓ vitesse ${world.speed.toFixed(1)}×`, 'ok');
      break;
    }
    default:
      showFeedback('⚠ commande non reconnue', 'err');
  }
}

function colorNameToHex(name) {
  return COLOR_MAP[name] || name;
}

// ─── INPUT EVENTS ─────────────────────────────────────────────────────────────
sendBtn.addEventListener('click', () => {
  handleCommand(input.value);
  input.value = '';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    handleCommand(input.value);
    input.value = '';
  }
});

pauseBtn.addEventListener('click', () => {
  if (world.paused) handleCommand('reprends');
  else handleCommand('pause');
});

document.querySelectorAll('.hint-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    handleCommand(pill.dataset.cmd);
  });
});

// ─── RENDERER ─────────────────────────────────────────────────────────────────

function buildPath(ctx, shape, x, y, r) {
  ctx.beginPath();
  switch (shape) {
    case 'circle':
      ctx.arc(x, y, r, 0, Math.PI * 2);
      break;
    case 'square': { const s = r * 1.5; ctx.rect(x - s/2, y - s/2, s, s); break; }
    case 'triangle': {
      const h = r * 1.8;
      ctx.moveTo(x, y - h/2);
      ctx.lineTo(x + h*0.6, y + h/2);
      ctx.lineTo(x - h*0.6, y + h/2);
      ctx.closePath(); break;
    }
    case 'star': {
      const sp = 5, ou = r*1.4, inn = r*0.6;
      let rot = Math.PI/2*3, stp = Math.PI/sp;
      ctx.moveTo(x, y - ou);
      for (let i = 0; i < sp; i++) {
        ctx.lineTo(x + Math.cos(rot)*ou, y + Math.sin(rot)*ou); rot += stp;
        ctx.lineTo(x + Math.cos(rot)*inn, y + Math.sin(rot)*inn); rot += stp;
      }
      ctx.closePath(); break;
    }
    case 'diamond':
      ctx.moveTo(x, y-r*1.5); ctx.lineTo(x+r,y); ctx.lineTo(x,y+r*1.5); ctx.lineTo(x-r,y);
      ctx.closePath(); break;
    default:
      ctx.arc(x, y, r, 0, Math.PI * 2);
  }
}

function drawShape(ctx, obj) {
  const { x, y, color, shape, radius, pulse, pulsePhase, speed } = obj;
  const r = pulse ? radius + Math.sin(pulsePhase) * 5 : radius;
  const glow = 10 + Math.min(22, (speed || 0) * 4);

  ctx.save();
  ctx.shadowBlur = glow;
  ctx.shadowColor = color;
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.92;
  buildPath(ctx, shape, x, y, r);
  ctx.fill();

  // Bright core
  ctx.shadowBlur = glow * 0.4;
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  buildPath(ctx, shape, x, y, r * 0.55);
  ctx.fill();

  ctx.restore();
}

function drawTrail(ctx, trail, color) {
  if (trail.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round';
  for (let i = 1; i < trail.length; i++) {
    const t = i / trail.length;
    ctx.beginPath();
    ctx.globalAlpha = t * t * 0.5;
    ctx.strokeStyle = color;
    ctx.lineWidth = t * 2.8;
    ctx.shadowBlur = t * 16;
    ctx.shadowColor = color;
    ctx.moveTo(trail[i-1].x, trail[i-1].y);
    ctx.lineTo(trail[i].x, trail[i].y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawGravityWell(ctx, well) {
  const t = Date.now() / 1000;
  const c = well.repel ? '#e74c3c' : '#9b59b6';
  ctx.save();
  for (let ring = 3; ring >= 1; ring--) {
    const r = 18 + ring * 24 + Math.sin(t * 1.8 + ring * 1.2) * 6;
    ctx.beginPath();
    ctx.globalAlpha = (4 - ring) * 0.07;
    ctx.strokeStyle = c;
    ctx.lineWidth = 1;
    ctx.shadowBlur = 10;
    ctx.shadowColor = c;
    ctx.arc(well.x, well.y, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = c;
  ctx.shadowBlur = 28;
  ctx.shadowColor = c;
  ctx.arc(well.x, well.y, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function renderBursts(ctx, bursts) {
  ctx.save();
  for (const b of bursts) {
    const t = b.age / b.maxAge;
    ctx.strokeStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.beginPath();
    ctx.globalAlpha = (1 - t) * 0.55;
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 8;
    ctx.arc(b.x, b.y, t * 60, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.globalAlpha = (1 - t) * 0.3;
    ctx.shadowBlur = 5;
    ctx.arc(b.x, b.y, t * 35, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawRelation(ctx, a, b, behavior) {
  const colors = { seek:'#3fb950', flee:'#f85149', orbit:'#58a6ff', flock:'#f39c12' };
  const c = colors[behavior] || '#8b949e';
  ctx.save();
  ctx.beginPath();
  ctx.setLineDash([3, 7]);
  ctx.globalAlpha = 0.18;
  ctx.strokeStyle = c;
  ctx.lineWidth = 1;
  ctx.shadowBlur = 4;
  ctx.shadowColor = c;
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawObstacle(ctx, obs) {
  ctx.save();
  ctx.fillStyle = obs.color;
  ctx.globalAlpha = 0.35;
  ctx.fillRect(obs.x - obs.w/2, obs.y - obs.h/2, obs.w, obs.h);
  ctx.globalAlpha = 0.6;
  ctx.strokeStyle = '#636e72';
  ctx.lineWidth = 1;
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#636e72';
  ctx.strokeRect(obs.x - obs.w/2, obs.y - obs.h/2, obs.w, obs.h);
  ctx.restore();
}

function render() {
  const W = canvas.width, H = canvas.height;

  // Background + vignette
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#080c14';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = '#0e1520';
  ctx.lineWidth = 1;
  const gs = 48;
  for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // Bursts
  renderBursts(ctx, world.bursts);

  // Gravity wells
  for (const well of Object.values(world.gravityWells)) drawGravityWell(ctx, well);

  // Obstacles
  for (const obs of Object.values(world.obstacles)) drawObstacle(ctx, obs);

  // Relations
  for (const obj of Object.values(world.objects)) {
    if (obj.targetId && world.objects[obj.targetId]) {
      drawRelation(ctx, obj, world.objects[obj.targetId], obj.behavior);
    }
  }

  // Trails first, then shapes (so shapes render on top)
  for (const obj of Object.values(world.objects)) drawTrail(ctx, obj.trail, obj.color);
  for (const obj of Object.values(world.objects)) drawShape(ctx, obj);
}

// ─── UI PANELS ────────────────────────────────────────────────────────────────
const SHAPE_LABELS = { circle:'cercle', square:'carré', triangle:'triangle', star:'étoile', diamond:'losange' };
const BEH_LABELS = { seek:'suit', flee:'fuit', orbit:'orbite', wander:'erre', flock:'essaim' };

function updatePanels() {
  const objs = Object.values(world.objects);
  const wells = Object.keys(world.gravityWells).length;
  const obs = Object.keys(world.obstacles).length;
  countBadge.textContent = `${objs.length} obj` + (wells ? ` · ${wells}⊕` : '') + (obs ? ` · ${obs}□` : '');

  // Structure
  if (objs.length === 0) {
    structureList.innerHTML = '<span style="color:var(--dim);font-size:11px;">aucun objet</span>';
  } else {
    structureList.innerHTML = objs.map(o => `
      <div class="struct-item">
        <div class="struct-dot" style="background:${o.color};"></div>
        <span>${SHAPE_LABELS[o.shape] || o.shape}</span>
        <span style="color:var(--dim);font-size:10px;margin-left:auto;">${BEH_LABELS[o.behavior] || o.behavior}</span>
      </div>
    `).join('');
  }

  // Memory
  if (objs.length === 0) {
    memoryList.innerHTML = '<span style="color:var(--dim);">— vide —</span>';
  } else {
    memoryList.innerHTML = objs.map(o => {
      const target = o.targetId && world.objects[o.targetId];
      const targetStr = target ? ` → ${SHAPE_LABELS[target.shape] || target.shape}` : '';
      return `<div class="mem-obj">
        <div><span class="mem-id">${o.id}</span></div>
        <div class="mem-detail">shape: ${SHAPE_LABELS[o.shape] || o.shape}</div>
        <div class="mem-detail">color: <span style="color:${o.color}">■</span> ${o.color}</div>
        <div class="mem-detail"><span class="mem-beh">${BEH_LABELS[o.behavior] || o.behavior}</span>${targetStr}</div>
        <div class="mem-detail">pos: (${Math.round(o.x)}, ${Math.round(o.y)})</div>
      </div>`;
    }).join('');
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let frame = 0;
function loop() {
  step(world, canvas.width, canvas.height);
  render();
  if (frame % 6 === 0) updatePanels();
  frame++;
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
